<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Arthur Frachon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <aside class="slim-sidebar">
        <div class="logo-circle">AF</div>

        <nav>
            <a href="index.html"><i class="fas fa-home"></i><span>Accueil</span></a>
            <a href="portfolio.html"><i class="fas fa-camera"></i><span>Galerie</span></a>
            <a href="a-propos.html"><i class="fas fa-user"></i><span>Profil</span></a>
            <a href="tarifs.html"><i class="fas fa-tags"></i><span>Services</span></a>
            <a href="contact.html" class="active"><i class="fas fa-envelope"></i><span>Contact</span></a>
        </nav>

        <div class="sidebar-bottom">
            <div class="lang-switch">
                <a href="#" class="active">FR</a>
                <span>|</span>
                <a href="#">EN</a>
            </div>
            <div class="sidebar-socials">
                <a href="https://www.instagram.com/arthur_frch" target="_blank" title="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="https://www.linkedin.com/in/TON_NOM" target="_blank" title="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </div>
        </div>
    </aside>

    <main class="content">
        <section class="page-header">
            <h1>Travaillons <span class="accent">Ensemble</span></h1>
            <p class="subtitle">Un projet, une question ou simplement envie d'échanger ?</p>
        </section>

        <section class="contact-wrapper">

            <div class="contact-form-container">
                <form action="https://formspree.io/f/TON_ID_ICI" method="POST" class="contact-form">
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" name="name" placeholder="Ton nom" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Ton adresse email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea name="message" rows="5" placeholder="Parle-moi de ton projet..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Envoyer</button>
                </form>
            </div>

            <div class="contact-info">
                <h3>Me Joindre Directement</h3>
                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>arthur.frachon@proton.me</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h4>Localisation</h4>
                        <p>Paris, France</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fab fa-instagram"></i>
                    <div>
                        <h4>Instagram</h4>
                        <p><a href="#" class="social-link">@arthur_frch <p>
                    </div>
                </div>
            </div>

        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
